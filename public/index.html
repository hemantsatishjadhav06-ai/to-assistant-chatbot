<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TO Assistant - TennisOutlet.in Support</title>
  <link rel="icon" href="https://tennisoutlet.in/favicon.ico" type="image/x-icon">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --primary: #1a7a1a;
      --primary-light: #2da02d;
      --primary-dark: #0f5f0f;
      --accent: #eeff00;
      --bg: #f0f2f5;
      --white: #ffffff;
      --text: #1a1a2e;
      --text-light: #6b7280;
      --border: #e5e7eb;
      --bot-bg: #ffffff;
      --user-bg: #1a7a1a;
      --shadow: 0 2px 12px rgba(0,0,0,0.08);
      --shadow-lg: 0 8px 30px rgba(0,0,0,0.12);
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--bg);
      height: 100vh;
      display: flex;
      flex-direction: column;
      color: var(--text);
    }

    /* Header */
    .header {
      background: linear-gradient(135deg, var(--primary-dark), var(--primary));
      color: white;
      padding: 16px 24px;
      display: flex;
      align-items: center;
      gap: 14px;
      box-shadow: var(--shadow);
      z-index: 10;
    }

    .header-avatar {
      width: 46px;
      height: 46px;
      background: var(--accent);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      flex-shrink: 0;
    }

    .header-info h1 {
      font-size: 17px;
      font-weight: 700;
      letter-spacing: -0.3px;
    }

    .header-info p {
      font-size: 12px;
      opacity: 0.85;
      margin-top: 2px;
    }

    .status-dot {
      width: 8px;
      height: 8px;
      background: #4ade80;
      border-radius: 50%;
      display: inline-block;
      margin-right: 5px;
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }

    .header-links {
      margin-left: auto;
      display: flex;
      gap: 8px;
    }

    .header-links a {
      color: white;
      text-decoration: none;
      font-size: 11px;
      padding: 5px 10px;
      border: 1px solid rgba(255,255,255,0.3);
      border-radius: 16px;
      transition: all 0.2s;
      white-space: nowrap;
    }

    .header-links a:hover {
      background: rgba(255,255,255,0.15);
      border-color: rgba(255,255,255,0.5);
    }

    /* Chat Area */
    .chat-container {
      flex: 1;
      overflow-y: auto;
      padding: 20px 16px;
      scroll-behavior: smooth;
    }

    .chat-container::-webkit-scrollbar { width: 6px; }
    .chat-container::-webkit-scrollbar-track { background: transparent; }
    .chat-container::-webkit-scrollbar-thumb { background: #ccc; border-radius: 3px; }

    .message-wrapper {
      display: flex;
      gap: 10px;
      margin-bottom: 16px;
      max-width: 820px;
      margin-left: auto;
      margin-right: auto;
      animation: fadeIn 0.3s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .message-wrapper.user {
      flex-direction: row-reverse;
    }

    .msg-avatar {
      width: 34px;
      height: 34px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      flex-shrink: 0;
      margin-top: 2px;
    }

    .msg-avatar.bot {
      background: var(--primary);
      color: white;
    }

    .msg-avatar.user {
      background: #6366f1;
      color: white;
    }

    .message {
      padding: 12px 16px;
      border-radius: 18px;
      max-width: 75%;
      line-height: 1.55;
      font-size: 14.5px;
      word-wrap: break-word;
    }

    .message.bot {
      background: var(--white);
      color: var(--text);
      border-bottom-left-radius: 6px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.06);
    }

    .message.user {
      background: var(--user-bg);
      color: white;
      border-bottom-right-radius: 6px;
    }

    .message a {
      color: var(--primary);
      text-decoration: underline;
      word-break: break-all;
    }

    .message.user a {
      color: var(--accent);
    }

    .message strong { font-weight: 600; }

    .message ul, .message ol {
      margin: 8px 0 8px 20px;
    }

    .message li { margin-bottom: 4px; }

    .message p { margin-bottom: 8px; }
    .message p:last-child { margin-bottom: 0; }

    /* Typing Indicator */
    .typing-wrapper {
      display: none;
      gap: 10px;
      margin-bottom: 16px;
      max-width: 820px;
      margin-left: auto;
      margin-right: auto;
    }

    .typing-wrapper.visible { display: flex; }

    .typing-bubble {
      background: var(--white);
      padding: 14px 20px;
      border-radius: 18px;
      border-bottom-left-radius: 6px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.06);
      display: flex;
      align-items: center;
      gap: 5px;
    }

    .typing-dot {
      width: 8px;
      height: 8px;
      background: #9ca3af;
      border-radius: 50%;
      animation: typingBounce 1.4s infinite;
    }

    .typing-dot:nth-child(2) { animation-delay: 0.2s; }
    .typing-dot:nth-child(3) { animation-delay: 0.4s; }

    @keyframes typingBounce {
      0%, 60%, 100% { transform: translateY(0); }
      30% { transform: translateY(-6px); }
    }

    /* Quick Actions */
    .quick-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      max-width: 820px;
      margin: 0 auto 16px;
      padding: 0 16px;
    }

    .quick-btn {
      padding: 8px 16px;
      border: 1.5px solid var(--primary);
      color: var(--primary);
      background: white;
      border-radius: 20px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
      font-family: inherit;
    }

    .quick-btn:hover {
      background: var(--primary);
      color: white;
      transform: translateY(-1px);
      box-shadow: 0 3px 8px rgba(26,122,26,0.25);
    }

    /* Input Area */
    .input-area {
      padding: 16px;
      background: var(--white);
      border-top: 1px solid var(--border);
    }

    .input-container {
      max-width: 820px;
      margin: 0 auto;
      display: flex;
      gap: 10px;
      align-items: flex-end;
    }

    .input-container textarea {
      flex: 1;
      padding: 12px 18px;
      border: 2px solid var(--border);
      border-radius: 24px;
      font-size: 14.5px;
      font-family: inherit;
      resize: none;
      outline: none;
      transition: border-color 0.2s;
      min-height: 46px;
      max-height: 120px;
      line-height: 1.4;
    }

    .input-container textarea:focus {
      border-color: var(--primary);
    }

    .input-container textarea::placeholder {
      color: #9ca3af;
    }

    .send-btn {
      width: 46px;
      height: 46px;
      border: none;
      background: var(--primary);
      color: white;
      border-radius: 50%;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
      flex-shrink: 0;
    }

    .send-btn:hover {
      background: var(--primary-light);
      transform: scale(1.05);
    }

    .send-btn:disabled {
      background: #d1d5db;
      cursor: not-allowed;
      transform: none;
    }

    .send-btn svg {
      width: 20px;
      height: 20px;
    }

    /* Footer */
    .footer {
      text-align: center;
      padding: 8px;
      font-size: 11px;
      color: var(--text-light);
      background: var(--white);
      border-top: 1px solid var(--border);
    }

    .footer a {
      color: var(--primary);
      text-decoration: none;
    }

    /* Responsive */
    @media (max-width: 640px) {
      .header { padding: 12px 16px; }
      .header-links { display: none; }
      .header-info h1 { font-size: 15px; }
      .message { max-width: 85%; font-size: 14px; }
      .quick-btn { font-size: 12px; padding: 6px 12px; }
    }

    /* Product card styling */
    .product-card {
      background: #f8fafc;
      border: 1px solid #e2e8f0;
      border-radius: 10px;
      padding: 10px;
      margin: 6px 0;
    }

    /* Markdown-like formatting */
    .message h3 { font-size: 14px; margin: 8px 0 4px; }
    .message code {
      background: #f1f5f9;
      padding: 2px 6px;
      border-radius: 4px;
      font-size: 13px;
    }
  </style>
</head>
<body>
  <!-- Header -->
  <div class="header">
    <div class="header-avatar">🎾</div>
    <div class="header-info">
      <h1>TO Assistant</h1>
      <p><span class="status-dot"></span>Online — TennisOutlet.in Support</p>
    </div>
    <div class="header-links">
      <a href="https://tennisoutlet.in" target="_blank">🛒 Shop</a>
      <a href="https://tennisoutlet.in/buying-guide" target="_blank">📖 Guide</a>
      <a href="tel:+919502517700">📞 Call Us</a>
    </div>
  </div>

  <!-- Chat Messages -->
  <div class="chat-container" id="chatContainer">
    <!-- Welcome message -->
    <div class="message-wrapper">
      <div class="msg-avatar bot">TO</div>
      <div class="message bot">
        Welcome to TennisOutlet! 🎾 How may I help you today?<br><br>
        I can help you with order tracking, product recommendations, returns, and more!
      </div>
    </div>

    <!-- Quick Actions -->
    <div class="quick-actions" id="quickActions">
      <button class="quick-btn" onclick="sendQuick('I want to check my order status')">📦 Track Order</button>
      <button class="quick-btn" onclick="sendQuick('Show me best selling tennis racquets')">🎾 Best Racquets</button>
      <button class="quick-btn" onclick="sendQuick('I need a beginner tennis racquet recommendation')">🆕 Beginner Guide</button>
      <button class="quick-btn" onclick="sendQuick('Tell me about pickleball paddles')">🏓 Pickleball</button>
      <button class="quick-btn" onclick="sendQuick('What is your return policy?')">🔄 Returns</button>
      <button class="quick-btn" onclick="sendQuick('I need help with my delivery')">🚚 Delivery Help</button>
    </div>

    <!-- Typing indicator -->
    <div class="typing-wrapper" id="typingIndicator">
      <div class="msg-avatar bot">TO</div>
      <div class="typing-bubble">
        <div class="typing-dot"></div>
        <div class="typing-dot"></div>
        <div class="typing-dot"></div>
      </div>
    </div>
  </div>

  <!-- Input -->
  <div class="input-area">
    <div class="input-container">
      <textarea
        id="messageInput"
        placeholder="Type your message..."
        rows="1"
        onkeydown="handleKeyDown(event)"
        oninput="autoResize(this)"
      ></textarea>
      <button class="send-btn" id="sendBtn" onclick="sendMessage()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <line x1="22" y1="2" x2="11" y2="13"></line>
          <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
        </svg>
      </button>
    </div>
  </div>

  <!-- Footer -->
  <div class="footer">
    Powered by <a href="https://tennisoutlet.in" target="_blank">TennisOutlet.in</a> | Pro Sports Outlets
  </div>

  <script>
    // State
    let conversationHistory = [];
    let isLoading = false;

    const chatContainer = document.getElementById('chatContainer');
    const messageInput = document.getElementById('messageInput');
    const sendBtn = document.getElementById('sendBtn');
    const typingIndicator = document.getElementById('typingIndicator');
    const quickActions = document.getElementById('quickActions');

    // Auto-resize textarea
    function autoResize(el) {
      el.style.height = 'auto';
      el.style.height = Math.min(el.scrollHeight, 120) + 'px';
    }

    // Handle Enter key
    function handleKeyDown(e) {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
      }
    }

    // Quick action buttons
    function sendQuick(text) {
      messageInput.value = text;
      sendMessage();
    }

    // Format bot response (robust markdown)
    function formatResponse(text) {
      if (!text) return '';

      // Step 1: Remove any markdown image syntax ![alt](url)
      text = text.replace(/!\[([^\]]*)\]\([^)]+\)/g, '');

      // Step 2: Clean up any raw HTML attributes that leaked (target="_blank"> etc)
      text = text.replace(/"\s*target="_blank">/g, '');
      text = text.replace(/target="_blank">/g, '');
      text = text.replace(/<\/a>/g, '');

      // Step 3: Bold
      text = text.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');

      // Step 4: Markdown links [text](url) — clean any trailing quotes/attributes
      text = text.replace(/\[([^\]]+)\]\((https?:\/\/[^)\s"]+)[^)]*\)/g, '<a href="$2" target="_blank">$1</a>');

      // Step 5: Bare URLs (not already inside href)
      text = text.replace(/(^|[^"=])(https?:\/\/[^\s<,)"]+)/gm, function(match, prefix, url) {
        // Clean trailing punctuation
        url = url.replace(/[.)]+$/, '');
        return prefix + '<a href="' + url + '" target="_blank">' + url + '</a>';
      });

      // Step 6: Line breaks
      text = text.replace(/\n\n/g, '</p><p>');
      text = text.replace(/\n/g, '<br>');

      // Step 7: Bullet points
      text = text.replace(/^[-•]\s+(.+)/gm, '<li>$1</li>');

      // Step 8: Clean up any double-wrapped links
      text = text.replace(/<a[^>]*><a/g, '<a');

      return text;
    }

    // Add message to chat
    function addMessage(content, isUser) {
      const wrapper = document.createElement('div');
      wrapper.className = `message-wrapper ${isUser ? 'user' : ''}`;

      const avatar = document.createElement('div');
      avatar.className = `msg-avatar ${isUser ? 'user' : 'bot'}`;
      avatar.textContent = isUser ? '👤' : 'TO';

      const msg = document.createElement('div');
      msg.className = `message ${isUser ? 'user' : 'bot'}`;

      if (isUser) {
        msg.textContent = content;
      } else {
        msg.innerHTML = formatResponse(content);
      }

      wrapper.appendChild(avatar);
      wrapper.appendChild(msg);

      // Insert before typing indicator
      chatContainer.insertBefore(wrapper, typingIndicator);
      scrollToBottom();
    }

    // Scroll to bottom
    function scrollToBottom() {
      setTimeout(() => {
        chatContainer.scrollTop = chatContainer.scrollHeight;
      }, 50);
    }

    // Show/hide typing
    function setTyping(show) {
      typingIndicator.classList.toggle('visible', show);
      if (show) scrollToBottom();
    }

    // Send message
    async function sendMessage() {
      const text = messageInput.value.trim();
      if (!text || isLoading) return;

      // Hide quick actions after first message
      if (quickActions) {
        quickActions.style.display = 'none';
      }

      // Add user message
      addMessage(text, true);
      conversationHistory.push({ role: 'user', content: text });

      // Clear input
      messageInput.value = '';
      messageInput.style.height = 'auto';

      // Set loading state
      isLoading = true;
      sendBtn.disabled = true;
      setTyping(true);

      try {
        const response = await fetch('/api/chat', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ messages: conversationHistory })
        });

        const data = await response.json();

        if (data.error) {
          addMessage("I'm sorry, I encountered an issue. Please try again or contact us at +91 9502517700.", false);
        } else {
          const botMessage = data.message || "I'm sorry, I couldn't process that. Could you please rephrase?";
          addMessage(botMessage, false);
          conversationHistory.push({ role: 'assistant', content: botMessage });
        }
      } catch (error) {
        console.error('Error:', error);
        addMessage("I'm having trouble connecting right now. Please try again in a moment, or call us directly at +91 9502517700 for immediate assistance.", false);
      } finally {
        isLoading = false;
        sendBtn.disabled = false;
        setTyping(false);
        messageInput.focus();
      }
    }

    // Focus input on load
    messageInput.focus();
  </script>
</body>
</html>
